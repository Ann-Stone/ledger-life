# Secret/PII guard. Enable once per clone:
#     pip install pre-commit        # or: pipx install pre-commit / brew install pre-commit
#     pre-commit install
# Thereafter every commit is scanned by gitleaks (config: .gitleaks.toml) and is
# blocked if a secret or PII pattern is detected.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
